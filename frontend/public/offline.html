<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos - Офлайн</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; color: #3f51b5; }
    p { margin: 0 0 24px; color: #666; text-align: center; max-width: 300px; }
    button {
      padding: 12px 24px;
      background: #3f51b5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #303f9f; }
  </style>
</head>
<body>
  <div class="icon">&#128225;</div>
  <h1>Няма връзка с интернет</h1>
  <p>Проверете вашата мрежова връзка и опитайте отново.</p>
  <button onclick="window.location.reload()">Опитай отново</button>
</body>
</html>
