[tool.ruff]
target-version = "py311"

# Top-level rules
lint.select = ["E", "F", "I", "N", "UP", "B", "SIM"]

# Ignore specific rules
lint.ignore = [
    "E501",    # line-too-long (already in codebase, too many violations)
    "E402",    # module-import-not-at-top-of-file (has some in main.py/config)
    "N999",    # invalid-module-name (would require renaming files)
    "SIM108",  # simplify-if-expression (subjective)
    "SIM115",  # use-context-handler-for-open-files (open/subprocess patterns)
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]

# Formatting
[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
